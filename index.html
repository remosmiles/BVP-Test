<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapo Uri - Einsatz-Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --police-blue: #002d62;
            --bright-blue: #0000ff;
            --bright-red: #ff0000;
        }

        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Echtes Blaulicht-System */
        .light-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            display: none; /* Erst beim Start sichtbar */
        }
        .light {
            width: 45%;
            height: 100%;
            filter: blur(20px);
        }
        .blue-flash { animation: flashBlue 0.3s infinite; }
        .red-flash { animation: flashRed 0.3s infinite 0.15s; }

        @keyframes flashBlue { 0%, 100% { background: transparent; } 50% { background: var(--bright-blue); box-shadow: 0 0 50px var(--bright-blue); } }
        @keyframes flashRed { 0%, 100% { background: transparent; } 50% { background: var(--bright-red); box-shadow: 0 0 50px var(--bright-red); } }

        /* Custom Alert Fenster */
        #custom-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: rgba(0, 0, 0, 0.9);
            border: 5px solid var(--bright-blue);
            padding: 40px;
            z-index: 2000;
            display: none;
            box-shadow: 0 0 50px var(--bright-blue);
            border-radius: 20px;
            opacity: 0;
            transition: all 0.3s ease;
        }
        #custom-alert.visible { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.5s; }
        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Bild & Sprechblase */
        #uri-img { max-width: 350px; border: 3px solid white; border-radius: 10px; margin-bottom: 20px; }
        
        .bubble {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 15px;
            max-width: 400px;
            font-weight: bold;
            position: relative;
        }

        /* Neon-Türen */
        .door-container { display: flex; gap: 30px; margin-top: 20px; }
        .door {
            width: 100px; height: 180px; border: 4px solid; cursor: pointer;
            display: flex; align-items: center; justify-content: center; border-radius: 8px;
        }
        .blue-door { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .pink-door { border-color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        .green-door { border-color: #39ff14; box-shadow: 0 0 15px #39ff14; }

        /* Target */
        #target {
            background: radial-gradient(circle, red, #400);
            border-radius: 50%; position: absolute; cursor: pointer;
            box-shadow: 0 0 20px red; display: none; border: 2px solid white;
        }

        .btn-action {
            padding: 15px 30px; background: var(--police-blue); color: white;
            border: 2px solid var(--neon-blue); cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="lights" class="light-bar">
        <div class="light blue-flash"></div>
        <div class="light blue-flash"></div>
    </div>

    <div id="custom-alert">
        <h1 style="color: var(--bright-red); margin: 0;">!!! ALARM !!!</h1>
        <p style="font-size: 1.5rem;">Einsatz im Kanton URI!</p>
        <p>Du wirst sofort an der Front gebraucht.</p>
        <button class="btn-action" onclick="closeAlert()">VERSTANDEN!</button>
    </div>

    <div id="step-1" class="screen active">
        <h1>BEREITSCHAFTSPOLIZEI URI</h1>
        <button class="btn-action" onclick="initSequence()">TRAINING STARTEN</button>
    </div>

    <div id="step-2" class="screen">
        <img src="Uri.JPG" alt="Uri" id="uri-img">
        <div class="bubble">
            Auf der Strasse musst du dich blitzschnell entscheiden. Wir trainieren jetzt deine Reflexe!
        </div>
    </div>

    <div id="step-4" class="screen">
        <h2>Wähle einen Sektor:</h2>
        <div class="door-container">
            <div class="door blue-door" onclick="startTraining()">A</div>
            <div class="door pink-door" onclick="startTraining()">B</div>
            <div class="door green-door" onclick="startTraining()">C</div>
        </div>
    </div>

    <div id="step-5" class="screen">
        <h3 id="round-info">Runde 1/5</h3>
        <div id="target"></div>
    </div>

    <div id="step-6" class="screen">
        <h1>TRAINING ERFOLGREICH!</h1>
        <p id="final-stats"></p>
        <a href="https://bullenpower-uri.ch" class="btn-action" style="background: #2ecc71;">WEITER ZU BULLENPOWER</a>
    </div>

    <script>
        let round = 1;
        let startTime;
        let results = [];
        let size = 100;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initSequence() {
            // Blaulicht an
            document.getElementById('lights').style.display = 'flex';
            // Custom Alert anzeigen
            const alertBox = document.getElementById('custom-alert');
            alertBox.style.display = 'block';
            setTimeout(() => alertBox.classList.add('visible'), 10);
        }

        function closeAlert() {
            document.getElementById('custom-alert').classList.remove('visible');
            setTimeout(() => {
                document.getElementById('custom-alert').style.display = 'none';
                showScreen('step-2');
                // Nach 4 Sekunden zu den Türen
                setTimeout(() => showScreen('step-4'), 4000);
            }, 300);
        }

        function startTraining() {
            showScreen('step-5');
            spawnTarget();
        }

        function spawnTarget() {
            const target = document.getElementById('target');
            // Button wird kleiner
            let currentSize = size - (round * 15);
            
            const x = Math.random() * (window.innerWidth - currentSize - 50);
            const y = Math.random() * (window.innerHeight - currentSize - 50);

            target.style.width = currentSize + "px";
            target.style.height = currentSize + "px";
            target.style.left = x + "px";
            target.style.top = y + "px";
            target.style.display = "block";
            
            startTime = performance.now();
        }

        document.getElementById('target').onclick = function() {
            let diff = (performance.now() - startTime) / 1000;
            if (diff <= 2.0) {
                results.push(diff);
                this.style.display = "none";
                if (round < 5) {
                    round++;
                    document.getElementById('round-info').innerText = `Runde ${round}/5`;
                    setTimeout(spawnTarget, 400);
                } else {
                    finishGame();
                }
            } else {
                alert("ZU LANGSAM! Versuch es noch einmal!");
                spawnTarget();
            }
        };

        function finishGame() {
            showScreen('step-6');
            let avg = results.reduce((a, b) => a + b, 0) / 5;
            document.getElementById('final-stats').innerText = `Durchschnitt: ${avg.toFixed(3)} Sekunden. Du bist bereit für Uri!`;
        }
    </script>
</body>
</html>
